<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl shadow-[0_10px_25px_-5px_rgba(43,148,200,0.15)] border border-surface-variant overflow-hidden scientific-transition hover:shadow-[0_15px_30px_-5px_rgba(43,148,200,0.2)] z-10 relative">
<!-- Header -->
<div class="p-stack-lg text-center border-b border-surface-variant bg-surface-bright">
<h1 class="font-headline-xl text-[#2b94c8] font-black mb-stack-sm">SimpleADN</h1>
<p class="font-body-md text-on-surface-variant">Portal de Laboratorio Clínico</p>
</div>
<!-- Tabs -->
<div class="flex border-b border-surface-variant relative">
<button class="flex-1 py-stack-md text-center font-label-md text-[#2b94c8] border-b-2 border-[#2b94c8] bg-[#2b94c8]/10 scientific-transition" id="tab-login" onclick="switchTab('login')">
                Iniciar sesión
            </button>
<button class="flex-1 py-stack-md text-center font-label-md text-on-surface-variant hover:text-[#e25c6b] hover:bg-surface-variant scientific-transition" id="tab-register" onclick="switchTab('register')">
                Crear cuenta
            </button>
</div>
<!-- Forms Container -->
<div class="p-stack-lg relative overflow-hidden h-[340px]">
<!-- Login Form -->
<form class="absolute inset-0 p-stack-lg flex flex-col gap-stack-lg scientific-transition transform translate-x-0 opacity-100" id="form-login">
<div class="floating-input relative pt-stack-sm">
<input class="input-glow w-full bg-transparent border-b-2 border-outline-variant focus:border-[#2b94c8] outline-none py-2 text-on-surface font-body-lg scientific-transition peer" id="login-email" placeholder=" " required="" type="email"/>
<label class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md pointer-events-none scientific-transition peer-focus:-translate-y-6 peer-focus:text-xs" for="login-email">Email</label>
</div>
<div class="floating-input relative pt-stack-sm">
<input class="input-glow w-full bg-transparent border-b-2 border-outline-variant focus:border-[#2b94c8] outline-none py-2 text-on-surface font-body-lg scientific-transition peer" id="login-password" placeholder=" " required="" type="password"/>
<label class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md pointer-events-none scientific-transition peer-focus:-translate-y-6 peer-focus:text-xs" for="login-password">Contraseña</label>
</div>
<div class="flex justify-between items-center mt-auto">
<a class="font-label-sm text-[#2b94c8] hover:underline" href="#">¿Olvidaste tu contraseña?</a>
<button class="bg-[#2b94c8] hover:bg-[#1a78a6] text-white font-label-md px-stack-lg py-3 rounded-lg shadow-sm hover:shadow-md scientific-transition flex items-center gap-stack-sm" type="button">
<span>Ingresar</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</form>
<!-- Register Form -->
<form class="absolute inset-0 p-stack-lg flex flex-col gap-stack-md scientific-transition transform translate-x-full opacity-0 pointer-events-none" id="form-register">
<div class="floating-input-reg relative pt-stack-sm">
<input class="input-glow-reg w-full bg-transparent border-b-2 border-outline-variant focus:border-[#e25c6b] outline-none py-2 text-on-surface font-body-lg scientific-transition peer" id="reg-name" placeholder=" " required="" type="text"/>
<label class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md pointer-events-none scientific-transition peer-focus:-translate-y-6 peer-focus:text-xs" for="reg-name">Nombre completo</label>
</div>
<div class="floating-input-reg relative pt-stack-sm">
<input class="input-glow-reg w-full bg-transparent border-b-2 border-outline-variant focus:border-[#e25c6b] outline-none py-2 text-on-surface font-body-lg scientific-transition peer" id="reg-email" placeholder=" " required="" type="email"/>
<label class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md pointer-events-none scientific-transition peer-focus:-translate-y-6 peer-focus:text-xs" for="reg-email">Email</label>
</div>
<div class="floating-input-reg relative pt-stack-sm">
<input class="input-glow-reg w-full bg-transparent border-b-2 border-outline-variant focus:border-[#e25c6b] outline-none py-2 text-on-surface font-body-lg scientific-transition peer" id="reg-password" placeholder=" " required="" type="password"/>
<label class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md pointer-events-none scientific-transition peer-focus:-translate-y-6 peer-focus:text-xs" for="reg-password">Contraseña</label>
</div>
<div class="flex justify-end mt-auto pt-stack-sm">
<button class="bg-[#e25c6b] hover:bg-[#c94b59] text-white font-label-md px-stack-lg py-3 rounded-lg shadow-sm hover:shadow-md scientific-transition flex items-center gap-stack-sm w-full justify-center" type="button">
<span>Registrarse</span>
<span class="material-symbols-outlined text-sm">person_add</span>
</button>
</div>
</form>
</div>
</main>
<script>
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');

            const loginActiveClasses = ['text-[#2b94c8]', 'border-b-2', 'border-[#2b94c8]', 'bg-[#2b94c8]/10'];
            const regActiveClasses = ['text-[#e25c6b]', 'border-b-2', 'border-[#e25c6b]', 'bg-[#e25c6b]/10'];
            const inactiveTabClasses = ['text-on-surface-variant', 'hover:bg-surface-variant'];

            if (tab === 'login') {
                // Forms
                loginForm.classList.remove('translate-x-[-100%]', 'opacity-0', 'pointer-events-none');
                loginForm.classList.add('translate-x-0', 'opacity-100');
                
                registerForm.classList.remove('translate-x-0', 'opacity-100');
                registerForm.classList.add('translate-x-full', 'opacity-0', 'pointer-events-none');

                // Tabs
                loginTab.classList.remove(...inactiveTabClasses, 'hover:text-[#2b94c8]');
                loginTab.classList.add(...loginActiveClasses);
                
                registerTab.classList.remove(...regActiveClasses);
                registerTab.classList.add(...inactiveTabClasses, 'hover:text-[#e25c6b]');
            } else {
                // Forms
                loginForm.classList.remove('translate-x-0', 'opacity-100');
                loginForm.classList.add('translate-x-[-100%]', 'opacity-0', 'pointer-events-none');
                
                registerForm.classList.remove('translate-x-full', 'opacity-0', 'pointer-events-none');
                registerForm.classList.add('translate-x-0', 'opacity-100');

                // Tabs
                registerTab.classList.remove(...inactiveTabClasses, 'hover:text-[#e25c6b]');
                registerTab.classList.add(...regActiveClasses);
                
                loginTab.classList.remove(...loginActiveClasses);
                loginTab.classList.add(...inactiveTabClasses, 'hover:text-[#2b94c8]');
            }
        }
    </script>
</body></html>
